<!DOCTYPE html>
<html>
<head>
    <title>My Flask App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to the Setup Page</h1>
    <p>This page is being served by Flask!</p>
    {% if step == 0 %}
        <a href="{{ discord_auth_url }}"><button style="padding:10px 20px;">Step 1: Link Discord & Add Bot</button></a>
    {% elif step == 1 %}
        <a href="{{ github_auth_url }}"><button style="padding:10px 20px;">Step 2: Link GitHub & Add Bot</button></a>
    {% elif step == 2 %}
        <a href="{{ discord_auth_url }}"><button style="padding:10px 20px;">Step 1: Link Discord & Add Bot</button></a>
        <a href="{{ github_auth_url }}"><button style="padding:10px 20px;">Step 2: Link GitHub & Add Bot</button></a>
    {% endif %}
</body>
</html>
